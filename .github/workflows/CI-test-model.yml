name: Test Model

on: 
  workflow_call:

jobs:
  train-model:
    runs-on: ubuntu-latest
    outputs:
      model-trained: ${{ steps.train.outputs.model-trained }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set python version
        uses: actions/setup-python@v4
        with:
          python-version: '3.8'

      - name: Train Model and Save as model.pkl
        id: train
        working-directory: ./app
        run: |
          pip install -r requirements_train.txt
          python3 train_model.py

          # Indica que o modelo foi treinado com sucesso
          echo "model-trained=true" >> $GITHUB_OUTPUT
      
      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: app/model.pkl

      - name: Setup CML
        uses: iterative/setup-cml@v3
      
      - name: Post CML Report
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        working-directory: ./app
        run: |
          echo "## Model Performance Metrics" > report.md
          cat metrics.txt >> report.md

          echo "![ROC Curve](auc_plot.png)" >> report.md

          cml comment create report.md

  test-model-endpoint:
    runs-on: ubuntu-latest
    if: needs.train-model.outputs.model-trained == 'true' # Só executa se o modelo foi treinado
    needs: train-model
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download Trained Model Artifact
        uses: actions/download-artifact@v4
        with:
          name: trained-model
          path: ./app

      - name: Docker Compose Up
        working-directory: ./app/test
        run: |
          docker compose up -d 
          sleep 10 # Aguarda o container iniciar
        
      - name: Test API Endpoint
        run: |
          # Realiza a chamada e armazena o corpo da resposta
          RESPONSE=$(curl -s -X POST "http://localhost:8080/2015-03-31/functions/function/invocations" \
            -d '{
                  "resource": "/predict",
                  "path": "/predict",
                  "httpMethod": "POST",
                  "headers": { "Content-Type": "application/json" },
                  "requestContext": { "resourcePath": "/predict", "httpMethod": "POST", "stage": "prod" },
                  "body": "{\"popularity\": 50, \"acousticness\": 0.5, \"danceability\": 0.5, \"duration_ms\": 200000, \"energy\": 0.5, \"instrumentalness\": 0, \"liveness\": 0.1, \"loudness\": -5, \"speechiness\": 0.05, \"tempo\": 120, \"valence\": 0.5}"
                }')

          echo "API Response: $RESPONSE"

          # Verifica se a predição existe na resposta (Validação lógica)
          if [[ "$RESPONSE" == *"prediction"* ]]; then
            echo "✅ Teste passou: Predição encontrada."
          else
            echo "❌ Teste falhou: Resposta inesperada."
            exit 1
          fi